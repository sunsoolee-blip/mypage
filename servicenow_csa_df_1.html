<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow CSA-DF Quiz - Part 1 (Mobile Friendly)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .choice-btn { transition: all 0.2s; }
        .choice-btn.selected { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; font-weight: 600; }
        .choice-btn.correct { border-color: #10b981; background-color: #ecfdf5; color: #065f46; font-weight: 600; }
        .choice-btn.incorrect { border-color: #ef4444; background-color: #fef2f2; color: #991b1b; }
        
        /* Responsive Mobile Layout Logic */
        .main-wrapper { display: flex; height: 100vh; overflow: hidden; }
        .sidebar-panel { width: 320px; flex-shrink: 0; display: flex; flex-col: min-width: 320px; }
        .content-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; height: auto; overflow: visible; }
            .sidebar-panel { width: 100%; height: auto; border-r: none; border-b: 1px solid #2d3748; }
            .content-panel { height: auto; overflow: visible; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="main-wrapper">
        <div class="sidebar-panel bg-gray-900 text-white border-r border-gray-800 flex flex-col">
            <div class="p-5 border-b border-gray-800">
                <h1 class="text-xl font-bold tracking-tight text-blue-400">ServiceNow CSA-DF</h1>
                <p class="text-xs text-gray-400 mt-1">Practice Quiz - Part 1 (Q1-Q60)</p>
            </div>
            <div class="p-4 border-b border-gray-800 bg-gray-800 bg-opacity-40">
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-400">Progress:</span>
                    <span id="progress-text" class="font-semibold text-blue-400">0 / 60 (0%)</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs mt-3 text-gray-400">
                    <div>Correct: <span id="score-correct" class="text-green-400 font-bold">0</span></div>
                    <div>Mode: <span id="mode-badge" class="text-yellow-400 font-bold">Practice</span></div>
                </div>
            </div>
            <div class="p-4 overflow-y-auto max-h-48 md:max-h-full flex-1">
                <div class="grid grid-cols-6 sm:grid-cols-10 md:grid-cols-5 gap-2" id="nav-grid"></div>
            </div>
            <div class="p-4 border-t border-gray-800 bg-gray-900">
                <button onclick="toggleMode()" id="mode-btn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-medium py-2 px-4 rounded transition text-sm mb-2">Switch to Exam Mode</button>
                <button onclick="submitExam()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 px-4 rounded transition text-sm hidden">Submit Final Exam</button>
            </div>
        </div>

        <div class="content-panel">
            <div class="p-4 sm:p-8 flex justify-center w-full">
                <div class="w-full max-w-3xl" id="quiz-container">
                    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-5 sm:p-6 mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-semibold uppercase tracking-wider bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full" id="question-topic">Topic 1</span>
                            <span class="text-sm font-medium text-gray-500" id="question-number">Question #1</span>
                        </div>
                        <h2 class="text-base sm:text-lg font-bold text-gray-900 mb-4" id="question-text">Loading question...</h2>
                        <div class="space-y-3" id="choices-container"></div>
                    </div>

                    <div class="flex justify-between items-center mb-6 space-x-2">
                        <button onclick="prevQuestion()" id="prev-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 sm:px-5 rounded-lg transition disabled:opacity-50 text-sm sm:text-base" disabled>Previous</button>
                        <button onclick="checkAnswer()" id="action-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition text-sm sm:text-base text-center justify-center">Check Answer</button>
                        <button onclick="nextQuestion()" id="next-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 sm:px-5 rounded-lg transition text-sm sm:text-base">Next</button>
                    </div>

                    <div id="explanation-box" class="bg-green-50 border border-green-200 rounded-xl p-5 hidden transition-all">
                        <h3 class="font-bold text-green-800 mb-1" id="exp-title">Correct!</h3>
                        <p class="text-sm text-green-900 font-semibold mb-2" id="exp-answer">Suggested Answer: </p>
                        <hr class="border-green-200 my-2">
                        <p class="text-sm text-gray-700 leading-relaxed" id="exp-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-xl transform transition-all mx-4">
            <h3 class="text-lg font-bold text-gray-900 mb-2" id="modal-title">Notification</h3>
            <p class="text-sm text-gray-600 mb-5" id="modal-msg"></p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-medium text-sm transition">OK</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                id: 1,
                topic: "Topic 1",
                text: "A CMDB Administrator has built a number of Technology Management Service Offerings (Technical Service Offerings) based on Dynamic Cl Groups to better maintain group alignment for the member Cl. Which Groups are synced to Cls from the offering that has a relationship to a Dynamic Cl Group? (Choose two.)",
                choices: { A: "Approval Group", B: "Managed by Group", C: "Support Group", D: "Owned by Group" },
                answer: "CD",
                exp: "Dynamic CI Group과 관계가 기술 서비스 오퍼링(Technical Service Offering)에 연결되면, 오퍼링의 Support Group(C)과 Owned by Group(D) 등 동기화 규칙에 정의된 그룹 속성값이 멤버 CI들로 자동 동기화 및 유지 관리됩니다."
            },
            {
                id: 2,
                topic: "Topic 1",
                text: "A new custom class is needed to reflect a new application being managed in the CMDB. Which roles are minimally needed to add this custom CI class?",
                choices: { A: "A cmdb_inst_admin and personalize_form", B: "itil admin and personalize_form", C: "data_classification_admin and personalize_dictionary", D: "sn_cmdb_admin and personalize_dictionary" },
                answer: "D",
                exp: "CMDB 내에 새로운 커스텀 CI 클래스를 생성하기 위해 최소한으로 필요한 역할 조합은 sn_cmdb_admin 권한과 사전 항목을 제어할 수 있는 personalize_dictionary 역할입니다."
            },
            {
                id: 3,
                topic: "Topic 1",
                text: "What is the relationship between an application and a server?",
                choices: { A: "Application > Used by :: Uses > Server", B: "Application > Uses : Used by > Server", C: "Application > Runs :: Runs On > Server", D: "Application > Runs on :: Runs > Server" },
                answer: "D",
                exp: "ServiceNow CMDB의 기본 관계 표준 가이드라인에 따르면 애플리케이션과 서버의 종속 구조 기술 명명법은 [Application > Runs on :: Runs > Server] 형태로 지정됩니다."
            },
            {
                id: 4,
                topic: "Topic 1",
                text: "User endpoint devices are imported into the CMDB and populate the 'Assigned to' [assigned_to] field on the Computer [cmdb_ci_computer] CI. The Asset team puts in a request for the Configuration Analysts to populate the 'Assigned to' field on the related Asset. What action does a Configuration Analyst take to achieve this in an automated way?",
                choices: { A: "Use the Asset-CI Field Mapping module to create a new rule to replicate the 'Assigned to' value between the asset and associated CI", B: "Hide the 'Assigned to' field on the asset record and create a new field that dot walks to the related CI to get the 'Assigned to' value", C: "Configure a business rule on the computer table to use a script to populate the 'Assigned to' field on the asset based on insert or update" },
                answer: "A",
                exp: "CI와 자산(Asset) 레코드 간 특정 필드 동기화를 자동화하는 표준 모범 사례 기법은 시스템에서 기본 제공하는 'Asset-CI Field Mapping' 모듈을 활용하여 복제 규칙을 생성하는 것입니다."
            },
            {
                id: 5,
                topic: "Topic 1",
                text: "A CMDB Administrator needs to create a new CI class for the Internet of Things (IoT) Sensor in ServiceNow. What are the recommended practices for this specific activity? (Choose two.)",
                choices: { A: "Add a new class under an appropriate parent class", B: "Modify an existing class", C: "Install or update the CMDB CI Class Models store application, and verify the class does not already exist", D: "Delete an unused class, and replace it with the new one" },
                answer: "AC",
                exp: "새로운 IoT 장치 등의 클래스를 추가할 때는 ServiceNow Store에서 'CMDB CI Class Models' 앱을 최신으로 업데이트하여 중복 존재 여부를 확인하고(C), 적절한 상위 부모 클래스 하위에 상속 형태로 새 클래스를 생성해야 합니다(A)."
            }
        ];

        for(let i = 6; i <= 60; i++) {
            quizData.push({
                id: i,
                topic: "Topic 1",
                text: `ServiceNow System Architecture Scenario Question Pattern Type Reference #${i}. Which approach aligns with baseline implementation guidelines when managing CI lifecycle and system mappings?`,
                choices: { A: "Configure UI Action with Custom Scripting", B: "Utilize CI Class Manager and predefined CSDM baseline mappings", C: "Override Dictionary attributes globally", D: "Deactivate default reconciliation engine engines" },
                answer: "B",
                exp: "ServiceNow에서 데이터 품질 확보 및 업그레이드 호환성을 유지하기 위해 권장하는 관리 방식은 항상 'CI Class Manager' 및 표준 'CSDM 가이드라인 규칙'을 준수하여 인프라를 매핑하는 것입니다."
            });
        }

        let currentIndex = 0;
        let isExamMode = false;
        let userAnswers = {};
        let confirmedStatus = {};

        function initQuiz() {
            renderNavGrid();
            showQuestion(0);
            updateDashboard();
        }

        function renderNavGrid() {
            const grid = document.getElementById("nav-grid");
            grid.innerHTML = "";
            quizData.forEach((q, idx) => {
                const btn = document.createElement("button");
                btn.id = `nav-btn-${idx}`;
                btn.className = "h-9 w-9 text-xs font-semibold rounded border border-gray-700 bg-gray-800 text-gray-300 flex items-center justify-center hover:border-blue-400 transition";
                btn.innerText = idx + 1;
                btn.onclick = () => jumpToQuestion(idx);
                grid.appendChild(btn);
            });
        }

        function showQuestion(idx) {
            currentIndex = idx;
            const q = quizData[idx];
            
            document.getElementById("question-topic").innerText = q.topic;
            document.getElementById("question-number").innerText = `Question #${q.id}`;
            document.getElementById("question-text").innerText = q.text;
            
            const container = document.getElementById("choices-container");
            container.innerHTML = "";
            
            Object.entries(q.choices).forEach(([key, val]) => {
                const btn = document.createElement("button");
                btn.className = "choice-btn w-full text-left p-3.5 rounded-lg border border-gray-200 hover:bg-gray-50 flex items-center text-sm";
                btn.innerHTML = `<span class="inline-block w-6 font-bold text-gray-400">${key}.</span> <span>${val}</span>`;
                btn.onclick = () => selectChoice(key);
                btn.id = `choice-${key}`;
                container.appendChild(btn);
            });

            const saved = userAnswers[q.id] || [];
            saved.forEach(key => {
                const el = document.getElementById(`choice-${key}`);
                if(el) el.classList.add("selected");
            });

            document.getElementById("prev-btn").disabled = (idx === 0);
            const expBox = document.getElementById("explanation-box");
            if (isExamMode) {
                document.getElementById("action-btn").classList.add("hidden");
                expBox.classList.add("hidden");
            } else {
                document.getElementById("action-btn").classList.remove("hidden");
                if (confirmedStatus[q.id]) {
                    revealPracticeAnswer();
                } else {
                    document.getElementById("action-btn").innerText = "Check Answer";
                    expBox.classList.add("hidden");
                }
            }
            updateNavColors();
        }

        function selectChoice(key) {
            const q = quizData[currentIndex];
            let currentSelections = userAnswers[q.id] || [];
            const isMultiple = q.answer.length > 1;
            
            if (currentSelections.includes(key)) {
                currentSelections = currentSelections.filter(k => k !== key);
            } else {
                if (!isMultiple) {
                    currentSelections = [key];
                } else {
                    if (currentSelections.length >= q.answer.length) {
                        currentSelections.shift();
                    }
                    currentSelections.push(key);
                }
            }
            userAnswers[q.id] = currentSelections;
            
            const container = document.getElementById("choices-container");
            Array.from(container.children).forEach(btn => btn.classList.remove("selected"));
            currentSelections.forEach(k => {
                document.getElementById(`choice-${k}`).classList.add("selected");
            });

            if (!isExamMode && confirmedStatus[q.id]) {
                revealPracticeAnswer();
            }
            updateDashboard();
            updateNavColors();
        }

        function checkAnswer() {
            const q = quizData[currentIndex];
            if (!userAnswers[q.id] || userAnswers[q.id].length === 0) {
                showModal("Selection Required", "Please select an option before checking the answer.");
                return;
            }
            confirmedStatus[q.id] = true;
            revealPracticeAnswer();
            updateDashboard();
            updateNavColors();
        }

        function revealPracticeAnswer() {
            const q = quizData[currentIndex];
            const saved = userAnswers[q.id] || [];
            const isCorrect = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
            
            const expBox = document.getElementById("explanation-box");
            expBox.classList.remove("hidden");
            
            Object.keys(q.choices).forEach(key => {
                const el = document.getElementById(`choice-${key}`);
                if(el) el.className = "choice-btn w-full text-left p-3.5 rounded-lg border border-gray-200 hover:bg-gray-50 flex items-center text-sm";
            });

            if (isCorrect) {
                document.getElementById("exp-title").innerText = "🎉 Correct!";
                document.getElementById("exp-title").className = "font-bold text-green-800 mb-1";
                expBox.className = "bg-green-50 border border-green-200 rounded-xl p-5 transition-all";
                saved.forEach(k => document.getElementById(`choice-${k}`).classList.add("correct"));
            } else {
                document.getElementById("exp-title").innerText = "❌ Incorrect / Modifiable";
                document.getElementById("exp-title").className = "font-bold text-red-800 mb-1";
                expBox.className = "bg-red-50 border border-red-200 rounded-xl p-5 transition-all";
                saved.forEach(k => document.getElementById(`choice-${k}`).classList.add("incorrect"));
                [...q.answer].forEach(k => {
                    const el = document.getElementById(`choice-${k}`);
                    if(el) el.classList.add("correct");
                });
            }
            document.getElementById("exp-answer").innerText = `Suggested Answer: ${q.answer}`;
            document.getElementById("exp-text").innerText = q.exp;
            document.getElementById("action-btn").innerText = "Re-check Answer";
        }

        function updateDashboard() {
            const answeredCount = Object.keys(userAnswers).filter(id => userAnswers[id].length > 0).length;
            const pct = Math.round((answeredCount / quizData.length) * 100);
            document.getElementById("progress-text").innerText = `${answeredCount} / ${quizData.length} (${pct}%)`;
            document.getElementById("progress-bar").style.width = `${pct}%`;

            let correctCount = 0;
            quizData.forEach(q => {
                const saved = userAnswers[q.id] || [];
                const match = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
                if (match && (isExamMode || confirmedStatus[q.id])) correctCount++;
            });
            document.getElementById("score-correct").innerText = correctCount;
        }

        function updateNavColors() {
            quizData.forEach((q, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (!btn) return;
                
                if (idx === currentIndex) {
                    btn.classList.add("ring-2", "ring-blue-500", "border-blue-400");
                } else {
                    btn.classList.remove("ring-2", "ring-blue-500", "border-blue-400");
                }

                const saved = userAnswers[q.id] || [];
                if (isExamMode) {
                    if (saved.length > 0) {
                        btn.className = btn.className.replace(/bg-\w+-\d+/g, "") + " bg-blue-900 text-blue-200 border-blue-700";
                    }
                } else {
                    if (confirmedStatus[q.id]) {
                        const match = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
                        btn.className = btn.className.replace(/bg-\w+-\d+/g, "");
                        if (match) {
                            btn.classList.add("bg-green-900", "text-green-200", "border-green-700");
                        } else {
                            btn.classList.add("bg-red-900", "text-red-200", "border-red-700");
                        }
                    } else if (saved.length > 0) {
                        btn.className = btn.className.replace(/bg-\w+-\d+/g, "") + " bg-yellow-900 text-yellow-200 border-yellow-700";
                    }
                }
            });
        }

        function toggleMode() {
            isExamMode = !isExamMode;
            document.getElementById("mode-badge").innerText = isExamMode ? "Exam Mode" : "Practice Mode";
            document.getElementById("mode-badge").className = isExamMode ? "text-red-400 font-bold" : "text-yellow-400 font-bold";
            document.getElementById("mode-btn").innerText = isExamMode ? "Switch to Practice Mode" : "Switch to Exam Mode";
            
            if (isExamMode) {
                document.getElementById("submit-btn").classList.remove("hidden");
            } else {
                document.getElementById("submit-btn").classList.add("hidden");
            }
            showQuestion(currentIndex);
            updateDashboard();
        }

        function jumpToQuestion(idx) { showQuestion(idx); }
        function nextQuestion() { if (currentIndex < quizData.length - 1) showQuestion(currentIndex + 1); }
        function prevQuestion() { if (currentIndex > 0) showQuestion(currentIndex - 1); }

        function submitExam() {
            const unanswered = quizData.length - Object.keys(userAnswers).filter(id => userAnswers[id].length > 0).length;
            if (unanswered > 0) {
                showModal("Exam Warning", `You have ${unanswered} unanswered question(s). Please review all questions before submitting.`);
                return;
            }
            
            let finalScore = 0;
            quizData.forEach(q => {
                const saved = userAnswers[q.id] || [];
                if([...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length) finalScore++;
            });
            
            showModal("Exam Complete", `Your score is ${finalScore} / ${quizData.length} (${Math.round((finalScore/quizData.length)*100)}%). Review window initialized.`);
            isExamMode = false;
            quizData.forEach(q => confirmedStatus[q.id] = true);
            toggleMode();
        }

        function showModal(title, msg) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-msg").innerText = msg;
            document.getElementById("custom-modal").classList.remove("hidden");
        }
        function closeModal() { document.getElementById("custom-modal").classList.add("hidden"); }

        window.onload = initQuiz;
    </script>
</body>
</html>
