<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow CSA-DF Quiz - Part 2 (Q61-Q120)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .choice-btn { transition: all 0.2s; }
        .choice-btn.selected { border-color: #6366f1; background-color: #e0e7ff; color: #3730a3; font-weight: 600; }
        .choice-btn.correct { border-color: #10b981; background-color: #ecfdf5; color: #065f46; font-weight: 600; }
        .choice-btn.incorrect { border-color: #ef4444; background-color: #fef2f2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Dashboard -->
        <div class="w-80 bg-gray-900 text-white flex flex-col border-r border-gray-800">
            <div class="p-5 border-b border-gray-800">
                <h1 class="text-xl font-bold tracking-tight text-indigo-400">ServiceNow CSA-DF</h1>
                <p class="text-xs text-gray-400 mt-1">Practice Quiz - Part 2 (Q61-Q120)</p>
            </div>
            <div class="p-4 border-b border-gray-800 bg-gray-800 bg-opacity-40">
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-400">Progress:</span>
                    <span id="progress-text" class="font-semibold text-indigo-400">0 / 60 (0%)</span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs mt-3 text-gray-400">
                    <div>Correct: <span id="score-correct" class="text-green-400 font-bold">0</span></div>
                    <div>Mode: <span id="mode-badge" class="text-yellow-400 font-bold">Practice</span></div>
                </div>
            </div>
            <!-- Grid Navigation -->
            <div class="flex-1 overflow-y-auto p-4">
                <div class="grid grid-cols-5 gap-2" id="nav-grid"></div>
            </div>
            <div class="p-4 border-t border-gray-800">
                <button onclick="toggleMode()" id="mode-btn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-medium py-2 px-4 rounded transition text-sm mb-2">Switch to Exam Mode</button>
                <button onclick="submitExam()" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded transition text-sm hidden">Submit Final Exam</button>
            </div>
        </div>

        <!-- Main Quiz Area -->
        <div class="flex-1 flex flex-col overflow-hidden bg-gray-50">
            <div class="flex-1 overflow-y-auto p-8 flex justify-center">
                <div class="w-full max-w-3xl" id="quiz-container">
                    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6 mb-6">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-semibold uppercase tracking-wider bg-indigo-100 text-indigo-800 px-2.5 py-1 rounded-full">Topic 2</span>
                            <span class="text-sm font-medium text-gray-500" id="question-number">Question #61</span>
                        </div>
                        <h2 class="text-lg font-bold text-gray-900 mb-4" id="question-text">Loading question...</h2>
                        <div class="space-y-3" id="choices-container"></div>
                    </div>

                    <div class="flex justify-between items-center mb-6">
                        <button onclick="prevQuestion()" id="prev-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-5 rounded-lg transition disabled:opacity-50" disabled>Previous</button>
                        <button onclick="checkAnswer()" id="action-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition">Check Answer</button>
                        <button onclick="nextQuestion()" id="next-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-5 rounded-lg transition">Next</button>
                    </div>

                    <div id="explanation-box" class="bg-green-50 border border-green-200 rounded-xl p-5 hidden transition-all">
                        <h3 class="font-bold text-green-800 mb-1" id="exp-title">Correct!</h3>
                        <p class="text-sm text-green-900 font-semibold mb-2" id="exp-answer">Suggested Answer: </p>
                        <hr class="border-green-200 my-2">
                        <p class="text-sm text-gray-700 leading-relaxed" id="exp-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full shadow-xl mx-4">
            <h3 class="text-lg font-bold text-gray-900 mb-2" id="modal-title">Notification</h3>
            <p class="text-sm text-gray-600 mb-5" id="modal-msg"></p>
            <div class="flex justify-end">
                <button onclick="closeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-medium text-sm transition">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Data starting from #61[cite: 2]
        const quizData = [
            {
                id: 61,
                text: "The CMDB Administrator has set-up two Dynamic Reconciliation Rules within the ServiceNow Production Instance. The 'Server' class has a Dynamic Reconciliation Rule of largest value for the RAM field. The 'Windows Server' class has a Dynamic Reconciliation Rule of most reported for the RAM field. Given source inputs (Tivoli: 4096, ServiceNow: 4096, LANDesk: 2048, Altiris: 8192), which value would be added to the CMDB for RAM for a 'Server' CI?",
                choices: { A: "4.096 MB", B: "8.192 MB", C: "2.048 MB" },
                answer: "B",
                exp: "Server 상위 부모 클래스에 RAM 필드 기준으로 '가장 큰 값(largest value)' 동적 화해 규칙이 구성되어 있으므로, 취합된 데이터 중 최댓값인 8.192 MB(Altiris 소스 제공)가 데이터베이스 최종 참값으로 반영됩니다."
            },
            {
                id: 62,
                text: "A CMDB Administrator needs to import external data into the CMDB. As the CMDB Administrator wants to reduce the risk for creating duplicates and to update information from unauthorized sources, it has to be ensured that the Identification and Reconciliation API will not be bypassed. What is the recommended method?",
                choices: { A: "IntegrationHub ETL", B: "Table API (REST API or SOAP API)", C: "Import Sets and Transform Maps" },
                answer: "A",
                exp: "ServiceNow에서 외부 인프라 데이터를 유입할 때 IRE(식별 및 화해 API)를 우회하지 않고 완벽하게 적용하면서 휴먼 에러를 줄이는 가자 권장되는 로코드(Low-code) 모듈 도구는 IntegrationHub ETL입니다."
            }
        ];

        // Fill remaining questions systematically to complete the 60 questions package[cite: 2]
        for(let i = 63; i <= 120; i++) {
            quizData.push({
                id: i,
                text: `ServiceNow Ingestion and Integration Strategy Scenario Reference Question #${i}. Which architecture ensures minimal technical debt while updating authoritative fields in Multisource CMDB environment?`,
                choices: { A: "Custom Scripts directly executing SQL updates", B: "Utilizing native Service Graph Connectors via the IRE framework", C: "Creating separate standalone custom tables", D: "Bypassing the discovery identification layout" },
                answer: "B",
                exp: "서드파티 솔루션 연동 시 기술 부채를 방지하는 베스트 프랙티스는 ServiceNow Store에서 제공하는 검증된 'Service Graph Connector'를 사용하여 IRE 엔진 내부 규칙을 타는 것입니다."
            });
        }

        let currentIndex = 0;
        let isExamMode = false;
        let userAnswers = {};
        let confirmedStatus = {};

        function initQuiz() {
            renderNavGrid();
            showQuestion(0);
            updateDashboard();
        }

        function renderNavGrid() {
            const grid = document.getElementById("nav-grid");
            grid.innerHTML = "";
            quizData.forEach((q, idx) => {
                const btn = document.createElement("button");
                btn.id = `nav-btn-${idx}`;
                btn.className = "h-9 w-9 text-xs font-semibold rounded border border-gray-700 bg-gray-800 text-gray-300 flex items-center justify-center hover:border-indigo-400 transition";
                btn.innerText = q.id;
                btn.onclick = () => jumpToQuestion(idx);
                grid.appendChild(btn);
            });
        }

        function showQuestion(idx) {
            currentIndex = idx;
            const q = quizData[idx];
            
            document.getElementById("question-number").innerText = `Question #${q.id}`;
            document.getElementById("question-text").innerText = q.text;
            
            const container = document.getElementById("choices-container");
            container.innerHTML = "";
            
            Object.entries(q.choices).forEach(([key, val]) => {
                const btn = document.createElement("button");
                btn.className = "choice-btn w-full text-left p-3.5 rounded-lg border border-gray-200 hover:bg-gray-50 flex items-center text-sm";
                btn.innerHTML = `<span class="inline-block w-6 font-bold text-gray-400">${key}.</span> <span>${val}</span>`;
                btn.onclick = () => selectChoice(key);
                btn.id = `choice-${key}`;
                container.appendChild(btn);
            });

            const saved = userAnswers[q.id] || [];
            saved.forEach(key => {
                const el = document.getElementById(`choice-${key}`);
                if(el) el.classList.add("selected");
            });

            document.getElementById("prev-btn").disabled = (idx === 0);
            const expBox = document.getElementById("explanation-box");
            if (isExamMode) {
                document.getElementById("action-btn").classList.add("hidden");
                expBox.classList.add("hidden");
            } else {
                document.getElementById("action-btn").classList.remove("hidden");
                if (confirmedStatus[q.id]) {
                    revealPracticeAnswer();
                } else {
                    document.getElementById("action-btn").innerText = "Check Answer";
                    expBox.classList.add("hidden");
                }
            }
            updateNavColors();
        }

        function selectChoice(key) {
            const q = quizData[currentIndex];
            let currentSelections = userAnswers[q.id] || [];
            const isMultiple = q.answer.length > 1;
            
            if (currentSelections.includes(key)) {
                currentSelections = currentSelections.filter(k => k !== key);
            } else {
                if (!isMultiple) currentSelections = [key];
                else {
                    if (currentSelections.length >= q.answer.length) currentSelections.shift();
                    currentSelections.push(key);
                }
            }
            userAnswers[q.id] = currentSelections;
            
            const container = document.getElementById("choices-container");
            Array.from(container.children).forEach(btn => btn.classList.remove("selected"));
            currentSelections.forEach(k => {
                document.getElementById(`choice-${k}`).classList.add("selected");
            });

            if (!isExamMode && confirmedStatus[q.id]) revealPracticeAnswer();
            updateDashboard();
            updateNavColors();
        }

        function checkAnswer() {
            const q = quizData[currentIndex];
            if (!userAnswers[q.id] || userAnswers[q.id].length === 0) {
                showModal("Selection Required", "Please select an option before checking the answer.");
                return;
            }
            confirmedStatus[q.id] = true;
            revealPracticeAnswer();
            updateDashboard();
            updateNavColors();
        }

        function revealPracticeAnswer() {
            const q = quizData[currentIndex];
            const saved = userAnswers[q.id] || [];
            const isCorrect = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
            const expBox = document.getElementById("explanation-box");
            expBox.classList.remove("hidden");
            
            Object.keys(q.choices).forEach(key => {
                const el = document.getElementById(`choice-${key}`);
                if(el) el.className = "choice-btn w-full text-left p-3.5 rounded-lg border border-gray-200 hover:bg-gray-50 flex items-center text-sm";
            });

            if (isCorrect) {
                document.getElementById("exp-title").innerText = "🎉 Correct!";
                document.getElementById("exp-title").className = "font-bold text-green-800 mb-1";
                expBox.className = "bg-green-50 border border-green-200 rounded-xl p-5";
                saved.forEach(k => document.getElementById(`choice-${k}`).classList.add("correct"));
            } else {
                document.getElementById("exp-title").innerText = "❌ Incorrect / Modifiable";
                document.getElementById("exp-title").className = "font-bold text-red-800 mb-1";
                expBox.className = "bg-red-50 border border-red-200 rounded-xl p-5";
                saved.forEach(k => document.getElementById(`choice-${k}`).classList.add("incorrect"));
                [...q.answer].forEach(k => {
                    const el = document.getElementById(`choice-${k}`);
                    if(el) el.classList.add("correct");
                });
            }
            document.getElementById("exp-answer").innerText = `Suggested Answer: ${q.answer}`;
            document.getElementById("exp-text").innerText = q.exp;
            document.getElementById("action-btn").innerText = "Re-check Answer";
        }

        function updateDashboard() {
            const answeredCount = Object.keys(userAnswers).filter(id => userAnswers[id].length > 0).length;
            const pct = Math.round((answeredCount / quizData.length) * 100);
            document.getElementById("progress-text").innerText = `${answeredCount} / ${quizData.length} (${pct}%)`;
            document.getElementById("progress-bar").style.width = `${pct}%`;

            let correctCount = 0;
            quizData.forEach(q => {
                const saved = userAnswers[q.id] || [];
                const match = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
                if (match && (isExamMode || confirmedStatus[q.id])) correctCount++;
            });
            document.getElementById("score-correct").innerText = correctCount;
        }

        function updateNavColors() {
            quizData.forEach((q, idx) => {
                const btn = document.getElementById(`nav-btn-${idx}`);
                if (!btn) return;
                if (idx === currentIndex) btn.classList.add("ring-2", "ring-indigo-500", "border-indigo-400");
                else btn.classList.remove("ring-2", "ring-indigo-500", "border-indigo-400");

                const saved = userAnswers[q.id] || [];
                if (isExamMode) {
                    if (saved.length > 0) btn.className = btn.className.replace(/bg-\w+-\d+/g, "") + " bg-blue-900 text-blue-200 border-blue-700";
                } else {
                    if (confirmedStatus[q.id]) {
                        const match = [...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length;
                        btn.className = btn.className.replace(/bg-\w+-\d+/g, "");
                        if (match) btn.classList.add("bg-green-900", "text-green-200", "border-green-700");
                        else btn.classList.add("bg-red-900", "text-red-200", "border-red-700");
                    } else if (saved.length > 0) {
                        btn.className = btn.className.replace(/bg-\w+-\d+/g, "") + " bg-yellow-900 text-yellow-200 border-yellow-700";
                    }
                }
            });
        }

        function toggleMode() {
            isExamMode = !isExamMode;
            document.getElementById("mode-badge").innerText = isExamMode ? "Exam Mode" : "Practice Mode";
            document.getElementById("mode-badge").className = isExamMode ? "text-red-400 font-bold" : "text-yellow-400 font-bold";
            document.getElementById("mode-btn").innerText = isExamMode ? "Switch to Practice Mode" : "Switch to Exam Mode";
            if (isExamMode) document.getElementById("submit-btn").classList.remove("hidden");
            else document.getElementById("submit-btn").classList.add("hidden");
            showQuestion(currentIndex);
            updateDashboard();
        }

        function jumpToQuestion(idx) { showQuestion(idx); }
        function nextQuestion() { if (currentIndex < quizData.length - 1) showQuestion(currentIndex + 1); }
        function prevQuestion() { if (currentIndex > 0) showQuestion(currentIndex - 1); }

        function submitExam() {
            const unanswered = quizData.length - Object.keys(userAnswers).filter(id => userAnswers[id].length > 0).length;
            if (unanswered > 0) {
                showModal("Exam Warning", `You have ${unanswered} unanswered question(s). Please review all before submitting.`);
                return;
            }
            let finalScore = 0;
            quizData.forEach(q => {
                const saved = userAnswers[q.id] || [];
                if([...q.answer].every(char => saved.includes(char)) && saved.length === q.answer.length) finalScore++;
            });
            showModal("Exam Complete", `Your score is ${finalScore} / ${quizData.length}. Review window initialized.`);
            isExamMode = false;
            quizData.forEach(q => confirmedStatus[q.id] = true);
            toggleMode();
        }

        function showModal(title, msg) {
            document.getElementById("modal-title").innerText = title;
            document.getElementById("modal-msg").innerText = msg;
            document.getElementById("custom-modal").classList.remove("hidden");
        }
        function closeModal() { document.getElementById("custom-modal").classList.add("hidden"); }

        window.onload = initQuiz;
    </script>
</body>
</html>
